services:
  db:
    image: postgres:15-alpine
    container_name: dataflow_postgres
    restart: always
    environment:
      POSTGRES_USER: dataflow_user
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: dataflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
